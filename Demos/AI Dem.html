<!DOCTYPE html>
<html lang="zh-CN">

<head>
<!-- Demos lightweight split:
  - Page structure remains in this HTML file.
  - Styles are maintained in ./assets/css/ai-dem.css.
  - Inline scripts are maintained in ./assets/js/.
  - Product notes and changelog are maintained in ./docs/.
-->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>零信任控制中心 - 访问体验监测</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- 引入 SeerDesign 全局样式与 Token -->
  <link rel="stylesheet" href="./assets/css/css-overrides.css">

  <!-- 引入 Alpine.js 及 Collapse 插件实现顺滑手风琴折叠 -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- 定义实时监测卡片的数据源生成器 -->
  <script src="./assets/js/ai-dem-data.js"></script>

  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./assets/js/tailwind-config.js"></script>

  <link rel="stylesheet" href="./assets/css/ai-dem.css" />
</head>

<body class="bg-bg-light text-text font-sans overflow-hidden w-screen h-screen">

  <!-- ======================================================
    Global SVG Definitions / 全局 SVG 定义
    用途：定义全局渐变，用于图标渲染，避免 background-clip 导致隐身。
    排障提示：如图标渐变、发光、颜色异常，优先检查此区域和 assets/css/ai-dem.css。
  ======================================================= -->
  <svg aria-hidden="true" style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1C6EFF" />
        <stop offset="100%" stop-color="#6DD405" />
      </linearGradient>
    </defs>
  </svg>

  <!-- ======================================================
    App Root State / 应用根级交互状态
    用途：维护顶部导航、左侧菜单展开项、当前叶子菜单、全局抽屉开关等 Alpine 状态。
    排障提示：如导航切换、菜单高亮、抽屉打开异常，优先检查此 x-data。
  ======================================================= -->
  <div class="flex flex-col w-full h-full" x-data="{
         topNav: '监控中心',
         expandedL2: 'm_0_0', 
         expandedL3: '',
         activeLeaf: 'm_0_0_0',
         drawer: false,
         navDefaults: {
           '监控中心': { l2: 'm_0_0', l3: '', leaf: 'm_0_0_0' },
           '全球安全互联': { l2: 'm_1_0', l3: '', leaf: 'm_1_0_0' },
           '零信任安全接入': { l2: '', l3: '', leaf: 'm_2_0' },
           '互联网安全访问': { l2: '', l3: '', leaf: 'm_3_0' },
           '数据保护': { l2: 'm_4_0', l3: 'm_4_0_0', leaf: 'm_4_0_0_0' },
           '业务管理': { l2: '', l3: '', leaf: 'm_5_0' },
           '系统管理': { l2: 'm_6_0', l3: '', leaf: 'm_6_0_0' },
           '审计中心': { l2: 'm_7_0', l3: '', leaf: 'm_7_0_0' }
         },
         setTopNav(nav) {
           this.topNav = nav;
           const d = this.navDefaults[nav];
           if(d) {
             this.expandedL2 = d.l2; this.expandedL3 = d.l3; this.activeLeaf = d.leaf;
           }
         },
         toggleL2(key, isLeaf = false) {
           if(isLeaf) { this.activeLeaf = key; this.expandedL2 = key; this.expandedL3 = ''; } 
           else { this.expandedL2 = this.expandedL2 === key ? '' : key; }
         },
         toggleL3(key) { this.expandedL3 = this.expandedL3 === key ? '' : key; },
         toggleL4(key) { this.activeLeaf = key; }
       }">

    <!-- ======================================================
      Header / 顶部导航栏，固定高度 56px
      包含：Logo、产品标题、顶部一级导航、右侧用户入口。
      排障提示：如顶部导航切换异常，检查 setTopNav(nav) 和 navDefaults。
    ======================================================= -->
    <header class="h-[56px] min-h-[56px] bg-white border-b border-bg-line flex items-center px-4 flex-shrink-0 z-30">
      <div class="flex items-center w-[280px] flex-shrink-0">
        <img src="https://i.imgur.com/jrWvSot.png" alt="Logo" class="w-[40px] h-[40px] object-contain flex-shrink-0">
        <span class="ml-3 text-lg font-semibold text-text-title whitespace-nowrap">零信任控制中心</span>
        <div class="ml-6 flex items-center gap-1 cursor-pointer text-xs text-text-title">
          <span>全订阅</span>
          <svg class="w-3 h-3 text-text-mute" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>

      <!-- 中间 NavCenter -->
      <div class="flex-1 flex justify-center">
        <div class="flex items-center gap-1">
          <template x-for="nav in ['监控中心', '全球安全互联', '零信任安全接入', '互联网安全访问', '数据保护', '业务管理', '系统管理', '审计中心']">
            <div class="at-top-nav-item" :class="topNav === nav && 'active'" @click="setTopNav(nav)" x-text="nav"></div>
          </template>
        </div>
      </div>

      <div class="flex items-center gap-4 w-[280px] justify-end pr-4">
        <svg class="w-4 h-4 text-text-title cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <div class="flex items-center gap-2 cursor-pointer">
          <div class="w-6 h-6 rounded-full bg-brand text-white flex items-center justify-center font-semibold text-xs">A
          </div>
          <span class="text-xs font-medium text-text-title">Admin</span>
        </div>
      </div>
    </header>

                          <span class="absolute -left-[31px] top-0.5 w-4 h-4 rounded-full bg-brand text-white flex items-center justify-center text-[10px] font-bold shadow">4</span>
                          <div class="flex flex-col gap-1.5">
                            <div class="flex items-center justify-between">
                              <span class="text-xs font-bold text-text-title">第四步：归属界责权判定 (Attribution Realm)</span>
                              <span class="text-[9px] text-text-mute" x-text="'归属组：' + getActiveIssue().drawerOwner"></span>
                            </div>
                            
                            <div class="grid grid-cols-[1.5fr_1fr] gap-4 items-center bg-bg-light/30 p-2.5 rounded border border-bg-line/40 text-[10px] text-text-mute leading-relaxed">
                              <div>
                                <span class="font-semibold text-text-title block mb-0.5">排障凭证与证据链抓取</span>
                                <span x-text="getActiveIssue().drawerEvidenceDesc"></span>
                              </div>
                              <div class="flex flex-col gap-1.5">
                                <a class="h-7.5 border border-brand/30 rounded bg-brand/5 hover:bg-brand/10 text-brand text-[9px] font-semibold flex items-center justify-center gap-1 cursor-pointer transition-all">
                                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                  <span>下载排障证据包.zip</span>
                                </a>
                                <span class="text-[8px] text-text-mute text-center scale-90" x-text="'SHA256: ' + getActiveIssue().id"></span>
                              </div>
                            </div>
                          </div>
                        </div>
                        
                      </div>
                    </div>
                  </div>
                  
                  <!-- Drawer Footer - 高度锁定 56px, 有 1px 分割线, 按钮左对齐 (主按钮左, 距边缘32px, 间距8px) -->
                  <div class="h-14 pl-4 flex items-center justify-start border-t border-bg-line bg-white flex-shrink-0">
                    <!-- 主按钮位于最左侧，带 ml-4 (16px) -->
                    <button class="ml-4 h-8 px-4 text-sm bg-brand text-white rounded hover:bg-brand-hover shadow-sm transition-colors flex items-center justify-center gap-1.5"
                            :class="(remediatingId === activeIssueId || remediatedIssues[activeIssueId]) && 'opacity-65 cursor-not-allowed bg-success hover:bg-success'"
                            :disabled="remediatingId === activeIssueId || remediatedIssues[activeIssueId]"
                            @click="triggerRemediation(activeIssueId)">
                      <template x-if="remediatingId === activeIssueId">
                        <span class="flex items-center gap-1">
                          <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-dasharray="31.415 31.415" stroke-dashoffset="0"></circle></svg>
                          正在执行修复...
                        </span>
                      </template>
                      <template x-if="remediatingId !== activeIssueId">
                        <span x-text="remediatedIssues[activeIssueId] ? (activeIssueId === 0 ? '已自动修复完成' : '已成功分发优化策略') : '一键推送AI处置决策策略'"></span>
                      </template>
                    </button>
                    
                    <!-- 取消按钮位于主按钮右侧，间距 8px -->
                    <button class="h-8 px-4 text-sm bg-white border border-border text-text rounded hover:text-brand hover:border-brand transition-colors" @click="aiDrawerOpen = false">关闭窗口</button>
                  </div>
                </div>
              </div>

            </div>
          </div></template>
        <!-- ======================================================
          Fallback Page / 非当前已设计模块占位页
          显示条件：不属于“监控中心 - 访问体验监测”时展示。
          排障提示：如误显示“模块建设中”，说明 topNav 或 activeLeaf 没有命中主页面条件。
        ======================================================= -->
        <template x-if="!(topNav === '监控中心' && activeLeaf.startsWith('m_0_0_'))">
          <div
            class="bg-white rounded-container shadow-[0_1px_3px_rgba(0,0,0,0.05)] flex-1 flex flex-col items-center justify-center text-graphite-d10">
            <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
              </path>
            </svg>
            <span class="text-sm">模块建设中...</span>
          </div>
        </template>
      </main>
    </div>

    <!-- ======================================================
      Global Drawer: Add Monitoring Task / 全局抽屉 - 添加监测任务
      用途：从监测任务区域触发，用于创建新的访问体验监测任务。
      状态变量：drawer。
      排障提示：如添加监测任务抽屉无法打开/关闭，检查 drawer 状态和触发按钮 @click。
    ======================================================= -->
    <div x-show="drawer" class="fixed inset-0 z-50 flex justify-end" x-cloak>
      <div class="absolute inset-0 bg-black/45 transition-opacity" @click="drawer = false" x-show="drawer"
        x-transition.opacity></div>
      <div class="w-[600px] bg-white h-full shadow-2xl flex flex-col relative z-10 transform transition-transform"
        x-show="drawer" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
        <div class="h-12 px-4 flex items-center justify-between border-b border-bg-line flex-shrink-0">
          <span class="text-lg font-semibold text-text">新建监测任务</span>
          <span class="cursor-pointer text-graphite hover:text-text" @click="drawer = false">✕</span>
        </div>
        <div class="flex-1 overflow-y-auto px-8 py-0">
          <div class="space-y-4 py-4">
            <div class="relative h-8 flex items-center pl-3 text-sm font-semibold text-text-title select-none mt-4">
              <span class="absolute left-0 w-0.5 h-3.5 bg-brand rounded-sm"></span>
              <span>基础配置</span>
            </div>
            <div class="flex items-start gap-4 mb-2">
              <label class="w-[120px] h-8 flex items-center text-xs text-graphite font-normal">
                <span class="text-risk mr-1 font-semibold">*</span>任务名称
              </label>
              <div class="flex-1 flex items-center gap-2">
                <input type="text"
                  class="flex-1 h-8 px-3 border border-border rounded-control text-xs focus:border-brand outline-none"
                  value="核心应用体验监测">
                <span class="w-4"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="h-14 px-4 flex items-center gap-2 border-t border-bg-line flex-shrink-0">
          <button class="h-8 px-4 bg-brand text-white text-md rounded-control hover:bg-brand-hover ml-4"
            @click="drawer = false">提交保存</button>
          <button class="h-8 px-4 border border-border text-text text-md rounded-control hover:border-brand"
            @click="drawer = false">取消</button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
